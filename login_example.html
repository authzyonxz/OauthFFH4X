<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login AUTH FFH4X</title>
    <style>
        :root {
            --bg-color: #e0e0e0;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #666666;
            --primary-btn: #007aff;
            --secondary-btn: #f2f2f7;
            --error-color: #ff3b30;
            --success-color: #34c759;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background-color: var(--card-bg);
            width: 320px;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: left;
            transition: transform 0.3s ease;
        }

        .alert-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .alert-description {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-btn);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.7;
        }

        .btn-primary {
            background-color: var(--primary-btn);
            color: white;
        }

        .btn-secondary {
            background-color: var(--secondary-btn);
            color: var(--text-main);
        }

        #status-msg {
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="login-card" id="login-container">
        <div class="alert-title" id="title">AUTH FFH4X</div>
        <div class="alert-description" id="desc">Insira sua licença abaixo para validar o acesso ao sistema.</div>
        
        <div class="input-group">
            <input type="text" id="license-key" placeholder="Cole sua Key aqui...">
        </div>

        <button class="btn btn-primary" id="btn-confirm" onclick="validateKey()">Confirmar Key</button>
        <button class="btn btn-secondary" onclick="window.location.reload()">Cancelar</button>

        <div id="status-msg"></div>
    </div>

    <script>
        const API_URL = 'https://authffh4x.up.railway.app/api/v1/validate_key';
        const PKG_TOKEN = 'PKG-ue2RH41zFXERvXtFMZ6qNfIB4i7q6DL3';

        async function validateKey() {
            const keyInput = document.getElementById('license-key');
            const btn = document.getElementById('btn-confirm');
            const statusMsg = document.getElementById('status-msg');
            const title = document.getElementById('title');
            const desc = document.getElementById('desc');

            const key = keyInput.value.trim();
            if (!key) {
                alert('Por favor, insira uma Key.');
                return;
            }

            // Simular HWID (Em um app real, use o ID do hardware)
            const hwid = "WEB-" + Math.random().toString(36).substring(7);

            // UI Loading
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Validando...';
            statusMsg.style.display = 'none';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        key: key,
                        hwid: hwid,
                        package_token: PKG_TOKEN
                    })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    // UI Sucesso (Estilo Successful)
                    title.innerText = "Successful!";
                    title.style.color = "var(--success-color)";
                    desc.innerHTML = `
                        <b>Status:</b> Key Válida<br>
                        <b>Expira em:</b> ${formatTime(data.expires_in)}<br>
                        <b>Expira em:</b> ${new Date(data.expires_at).toLocaleDateString()}<br>
                        <b>Dispositivo:</b> Autorizado
                    `;
                    keyInput.parentElement.style.display = 'none';
                    btn.style.display = 'none';
                } else {
                    // UI Erro
                    statusMsg.innerText = "Erro: " + data.message;
                    statusMsg.style.color = "var(--error-color)";
                    statusMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = "Tentar Novamente";
                }
            } catch (error) {
                statusMsg.innerText = "Erro de conexão com o servidor.";
                statusMsg.style.color = "var(--error-color)";
                statusMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerText = "Confirmar Key";
            }
        }

        function formatTime(seconds) {
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            if (days > 0) return `${days} dias e ${hours}h`;
            return `${hours} horas`;
        }
    </script>
</body>
</html>
